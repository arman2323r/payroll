<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title><!DOCTYPE html>
        <html xmlns:th="http://www.thymeleaf.org" lang="fa" dir="rtl">
        <head>
        <meta charset="UTF-8">
        <title>تغییر رمز عبور</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card w-50 mx-auto shadow">
        <div class="card-header bg-warning text-white">
            <h4>🔐 تغییر رمز عبور اجباری</h4>
        </div>
        <div class="card-body">
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <p class="text-danger">برای اولین ورود، لطفاً رمز عبور خود را تغییر دهید.</p>

            <form method="post" th:action="@{/change-password}">
                <div class="mb-3">
                    <label>رمز عبور جدید</label>
                    <input type="password" name="newPassword" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>تکرار رمز عبور جدید</label>
                    <input type="password" name="confirmPassword" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">تغییر رمز عبور</button>
            </form>
        </div>
    </div>
</div>
</body>
</html></title>
</head>

</body>
</html>
