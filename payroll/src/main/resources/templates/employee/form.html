<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ثبت/ویرایش کارمند</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card w-75 mx-auto">
        <div class="card-header bg-primary text-white"><h3>اطلاعات کارمند</h3></div>
        <div class="card-body">
            <!-- نمایش پیام خطا -->
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <form th:action="@{/employees/save}" th:object="${employee}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label>کد ملی (10 رقم)</label>
                    <input class="form-control" th:field="*{nationalCode}" required maxlength="10" pattern="\d{10}" title="کد ملی باید 10 رقم باشد">
                    <small class="text-muted">کد ملی باید 10 رقم باشد (فقط عدد)</small>
                </div>
                <div class="mb-3">
                    <label>نام</label>
                    <input class="form-control" th:field="*{firstName}" required>
                </div>
                <div class="mb-3">
                    <label>نام خانوادگی</label>
                    <input class="form-control" th:field="*{lastName}" required>
                </div>
                <div class="mb-3">
                    <label>تاریخ استخدام</label>
                    <input type="date" class="form-control" th:field="*{employmentDate}" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" th:field="*{isActive}" class="form-check-input">
                    <label class="form-check-label">فعال</label>
                </div>
                <button type="submit" class="btn btn-success">ذخیره</button>
                <a th:href="@{/employees}" class="btn btn-secondary">انصراف</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
