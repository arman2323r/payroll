<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشاهده فیش حقوقی</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card">
        <div class="card-header bg-success text-white">
            <h3>فیش حقوقی</h3>
        </div>
        <div class="card-body">
            <p><strong>کارمند:</strong> <span th:text="${payroll.employee.firstName + ' ' + payroll.employee.lastName}"></span></p>
            <p><strong>سال/ماه:</strong> <span th:text="${payroll.period}"></span></p>
            <hr>

            <h5>دریافتی‌ها</h5>
            <table class="table table-bordered">
                <thead class="table-secondary">
                <tr>
                    <th>عنوان</th>
                    <th>مبلغ (ریال)</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="d : ${payroll.details}" th:if="${d.itemType == 'EARNING'}">
                    <td th:text="${d.description}">...</td>
                    <td class="text-end" th:text="${#numbers.formatInteger(d.amount, 1, 'COMMA')}">...</td>
                </tr>
                </tbody>
            </table>

            <h5>کسورات</h5>
            <table class="table table-bordered">
                <thead class="table-secondary">
                <tr>
                    <th>عنوان</th>
                    <th>مبلغ (ریال)</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="d : ${payroll.details}" th:if="${d.itemType == 'DEDUCTION'}">
                    <td th:text="${d.description}">...</td>
                    <td class="text-end" th:text="${#numbers.formatInteger(d.amount, 1, 'COMMA')}">...</td>
                </tr>
                </tbody>
            </table>

            <hr>
            <h4 class="text-success">خالص پرداختی: <span th:text="${#numbers.formatInteger(payroll.netPayable, 1, 'COMMA')}"></span> ریال</h4>
            <a th:href="@{/employee/payrolls}" class="btn btn-secondary mt-3">🔙 بازگشت به لیست فیش‌ها</a>
        </div>
    </div>
</div>
</body>
</html>
