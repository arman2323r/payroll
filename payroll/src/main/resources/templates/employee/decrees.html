<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>احکام حقوقی من</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="m-0">📜 احکام حقوقی من</h1>
        <a th:href="@{/employee/dashboard}" class="btn btn-secondary">🔙 بازگشت</a>
    </div>
    <div class="card shadow">
        <div class="card-body">
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div class="table-responsive">
                <table class="table table-bordered text-center">
                    <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>تاریخ اجرا</th>
                        <th>حقوق پایه (ریال)</th>
                        <th>حق مسکن (ریال)</th>
                        <th>بن کارگری (ریال)</th>
                        <th>سایر مزایا (ریال)</th>
                        <th>وضعیت</th>
                        <th>عملیات</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="d, iterStat : ${decrees}">
                        <td th:text="${iterStat.count}">1</td>
                        <td th:text="${d.effectiveDate}">2025-01-01</td>
                        <td th:text="${#numbers.formatInteger(d.basicSalary, 1, 'COMMA')}">0</td>
                        <td th:text="${#numbers.formatInteger(d.housingAllowance, 1, 'COMMA')}">0</td>
                        <td th:text="${#numbers.formatInteger(d.breadAllowance, 1, 'COMMA')}">0</td>
                        <td th:text="${#numbers.formatInteger(d.otherBenefits, 1, 'COMMA')}">0</td>
                        <td>
                            <span th:if="${d.isCurrent}" class="badge bg-success">جاری</span>
                            <span th:unless="${d.isCurrent}" class="badge bg-secondary">قدیمی</span>
                        </td>
                        <td>
                            <a th:href="@{/employee/decree/view/{id}(id=${d.id})}" class="btn btn-sm btn-info">🔍 مشاهده جزئیات</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(decrees)}">
                        <td colspan="8" class="text-center">هیچ حکمی برای شما ثبت نشده است</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
