<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لیست کارمندان</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="m-0">لیست کارمندان</h1>
        <div class="d-flex gap-2">
            <a th:href="@{/employees/new}" class="btn btn-primary">➕ کارمند جدید</a>
            <a th:href="@{/admin/dashboard}" class="btn btn-secondary">🔙 بازگشت</a>
        </div>
    </div>
    <div class="card shadow">
        <div class="card-body">
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <table class="table table-bordered text-center">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>کد ملی</th>
                    <th>نام</th>
                    <th>نام خانوادگی</th>
                    <th>تاریخ استخدام</th>
                    <th>عملیات</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="emp, iterStat : ${employees}">
                    <td th:text="${iterStat.count}">1</td>
                    <td th:text="${emp.nationalCode}">1234567890</td>
                    <td th:text="${emp.firstName}">علی</td>
                    <td th:text="${emp.lastName}">رضایی</td>
                    <td th:text="${emp.employmentDate}">2025-01-01</td>
                    <td>
                        <a th:href="@{/employees/edit/{id}(id=${emp.id})}" class="btn btn-sm btn-warning me-1">✏️ ویرایش</a>
                        <a th:href="@{/employees/delete/{id}(id=${emp.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('آیا از حذف این کارمند اطمینان دارید؟')">🗑️ حذف</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(employees)}">
                    <td colspan="6" class="text-center">هیچ کارمندی ثبت نشده است</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
