<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فرم حکم</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        .number-format {
            text-align: left;
            direction: ltr;
        }
    </style>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card w-75 mx-auto shadow">
        <div class="card-header bg-primary text-white">
            <h3 th:text="${decree.id} ? 'ویرایش حکم' : 'حکم جدید'">فرم حکم</h3>
        </div>
        <div class="card-body">
            <form th:action="@{/decrees/save}" th:object="${decree}" method="post" id="decreeForm">
                <input type="hidden" th:field="*{id}">
                <div class="mb-3"><label>کارمند</label><select th:field="*{employee.id}" class="form-select" required><option value="">انتخاب کنید</option><option th:each="emp : ${employees}" th:value="${emp.id}" th:text="${emp.firstName}+' '+${emp.lastName}"></option></select></div>
                <div class="mb-3"><label>تاریخ اجرا</label><input type="date" th:field="*{effectiveDate}" class="form-control" required></div>

                <div class="mb-3">
                    <label>حقوق پایه (ریال)</label>
                    <input type="text" id="basicSalary" class="form-control number-format" required>
                    <input type="hidden" th:field="*{basicSalary}" id="basicSalaryHidden">
                </div>

                <div class="mb-3">
                    <label>سایر مزایا (ریال)</label>
                    <input type="text" id="otherBenefits" class="form-control number-format">
                    <input type="hidden" th:field="*{otherBenefits}" id="otherBenefitsHidden">
                </div>

                <div class="mb-3 form-check"><input type="checkbox" th:field="*{isCurrent}" class="form-check-input"><label class="form-check-label">حکم جاری</label></div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">💾 ذخیره</button>
                    <a th:href="@{/decrees}" class="btn btn-secondary">🔙 بازگشت</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function formatNumber(num) {
        if (!num) return '';
        return Number(num).toLocaleString('en-US');
    }

    function parseNumber(str) {
        if (!str) return '';
        return str.replace(/,/g, '');
    }

    const basicSalaryInput = document.getElementById('basicSalary');
    const basicSalaryHidden = document.getElementById('basicSalaryHidden');
    const otherBenefitsInput = document.getElementById('otherBenefits');
    const otherBenefitsHidden = document.getElementById('otherBenefitsHidden');

    if (basicSalaryHidden.value) {
        basicSalaryInput.value = formatNumber(basicSalaryHidden.value);
    }
    if (otherBenefitsHidden.value) {
        otherBenefitsInput.value = formatNumber(otherBenefitsHidden.value);
    }

    basicSalaryInput.addEventListener('input', function() {
        let rawValue = parseNumber(this.value);
        this.value = formatNumber(rawValue);
        basicSalaryHidden.value = rawValue;
    });

    otherBenefitsInput.addEventListener('input', function() {
        let rawValue = parseNumber(this.value);
        this.value = formatNumber(rawValue);
        otherBenefitsHidden.value = rawValue;
    });

    document.getElementById('decreeForm').addEventListener('submit', function() {
        basicSalaryHidden.value = parseNumber(basicSalaryInput.value);
        otherBenefitsHidden.value = parseNumber(otherBenefitsInput.value);
    });
</script>
</body>
</html>
