<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محاسبه فیش حقوقی</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card w-50 mx-auto">
        <div class="card-header bg-success text-white">
            <h3>محاسبه فیش حقوقی ماهانه</h3>
        </div>
        <div class="card-body">
            <!-- نمایش پیام خطا -->
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <form method="post" th:action="@{/payrolls/calculate}">
                <div class="mb-3">
                    <label>کارمند</label>
                    <select name="employeeId" class="form-select" required>
                        <option value="">انتخاب کنید</option>
                        <option th:each="emp : ${employees}" th:value="${emp.id}" th:text="${emp.firstName + ' ' + emp.lastName}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>دوره (سال-ماه)</label>
                    <input type="month" name="period" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary">💰 محاسبه و ذخیره</button>
                <a th:href="@{/payrolls}" class="btn btn-secondary">🔙 بازگشت</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
