<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لیست فیش‌های حقوقی</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>فیش‌های حقوقی</h1>
        <div class="d-flex gap-2">
            <a th:href="@{/payrolls/calculate}" class="btn btn-primary">➕ محاسبه فیش جدید</a>
            <a th:href="@{/admin/dashboard}" class="btn btn-secondary">🔙 بازگشت</a>
        </div>
    </div>
    <div class="card">
        <div class="card-body">
            <!-- نمایش پیام‌های موفقیت و خطا -->
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <table class="table table-bordered">
                <thead class="table-dark">
                <tr>
                    <th>کارمند</th>
                    <th>سال/ماه</th>
                    <th>دریافتی‌ها</th>
                    <th>کسورات</th>
                    <th>خالص پرداختی</th>
                    <th>وضعیت</th>
                    <th>عملیات</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${payrolls}">
                    <td th:text="${p.employee.firstName + ' ' + p.employee.lastName}">نام کارمند</td>
                    <td th:text="${p.period}">...</td>
                    <td th:text="${#numbers.formatInteger(p.totalEarnings, 1, 'COMMA')}">...</td>
                    <td th:text="${#numbers.formatInteger(p.totalDeductions, 1, 'COMMA')}">...</td>
                    <td th:text="${#numbers.formatInteger(p.netPayable, 1, 'COMMA')}">...</td>
                    <td th:text="${p.status}">...</td>
                    <td>
                        <a th:href="@{/payrolls/view/{id}(id=${p.id})}" class="btn btn-sm btn-info">🔍 مشاهده</a>
                        <a th:href="@{/payrolls/delete/{id}(id=${p.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('آیا از حذف این فیش اطمینان دارید؟')">🗑️ حذف</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(payrolls)}">
                    <td colspan="7">هیچ فیشی ثبت نشده</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="mt-3">
    </div>
</div>
</body>
</html>
