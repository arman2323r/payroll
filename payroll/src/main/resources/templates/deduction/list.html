<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لیست کسورات</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between mb-4 align-items-center">
        <h1>لیست کسورات</h1>
        <div>
            <a th:href="@{/deductions/new}" class="btn btn-primary">➕ کسر جدید</a>
            <a th:href="@{/admin/dashboard}" class="btn btn-secondary">🔙 بازگشت</a>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>کارمند</th>
                    <th>نوع کسر</th>
                    <th>مبلغ (ریال)</th>
                    <th>ماه کسر</th>
                    <th>وضعیت اعمال</th>
                    <th>عملیات</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="d, iterStat : ${deductions}">
                    <td th:text="${iterStat.count}">1</td>
                    <td th:text="${d.employee.firstName + ' ' + d.employee.lastName}">نام کارمند</td>
                    <td>
                        <span th:if="${d.deductionType == 'LOAN'}" class="badge bg-primary">وام</span>
                        <span th:if="${d.deductionType == 'ADVANCE'}" class="badge bg-warning">مساعده</span>
                        <span th:if="${d.deductionType == 'PENALTY'}" class="badge bg-danger">جریمه</span>
                        <span th:if="${d.deductionType == 'OTHER'}" class="badge bg-secondary">سایر</span>
                    </td>
                    <td th:text="${#numbers.formatInteger(d.amount, 1, 'COMMA')}">0</td>
                    <td th:text="${d.period}">2025-03</td>
                    <td>
                        <span th:if="${d.isApplied}" class="badge bg-success">اعمال شده</span>
                        <span th:unless="${d.isApplied}" class="badge bg-secondary">اعمال نشده</span>
                    </td>
                    <td>
                        <a th:href="@{/deductions/edit/{id}(id=${d.id})}" class="btn btn-sm btn-warning me-1">✏️ ویرایش</a>
                        <a th:href="@{/deductions/delete/{id}(id=${d.id})}" class="btn btn-sm btn-danger" onclick="return confirm('آیا از حذف این کسر اطمینان دارید؟')">🗑️ حذف</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(deductions)}">
                    <td colspan="7" class="text-center">هیچ کسری ثبت نشده است</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
