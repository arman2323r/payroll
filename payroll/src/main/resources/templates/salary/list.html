<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لیست حقوق پایه سالانه</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between mb-4 align-items-center">
        <h1 class="h3">حقوق پایه سالانه</h1>
        <div>
            <a th:href="@{/salary/new}" class="btn btn-primary">➕ ثبت جدید</a>
            <a th:href="@{/admin/dashboard}" class="btn btn-secondary">🔙 بازگشت</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                <tr>
                    <th>سال</th>
                    <th>حقوق پایه</th>
                    <th>بن کارگری</th>
                    <th>حق مسکن</th>
                    <th>درصد بیمه</th>
                    <th>عملیات</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${salaries}" th:if="${item != null}">
                    <td th:text="${item.year}">1403</td>
                    <td th:text="${#numbers.formatInteger(item.basicSalary, 1, 'COMMA')}">0</td>
                    <td th:text="${#numbers.formatInteger(item.breadAllowance, 1, 'COMMA')}">0</td>
                    <td th:text="${#numbers.formatInteger(item.housingAllowance, 1, 'COMMA')}">0</td>
                    <td th:text="${#numbers.formatDecimal(item.insurancePercent, 1, 2, 'COMMA')} + '%'">0</td>
                    <td>
                        <a th:href="@{/salary/edit/{id}(id=${item.id})}" class="btn btn-sm btn-warning">✏️ ویرایش</a>
                        <a th:href="@{/salary/delete/{id}(id=${item.id})}" class="btn btn-sm btn-danger" onclick="return confirm('آیا مطمئن هستید؟')">🗑️ حذف</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(salaries)}">
                    <td colspan="7" class="text-center">هیچ رکوردی یافت نشد</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="mt-3">
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
