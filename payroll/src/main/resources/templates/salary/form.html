<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>فرم حقوق پایه سالانه</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    <style>
        .number-format {
            text-align: left;
            direction: ltr;
        }
    </style>
</head>
<body>
<div class="container mt-4">
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3 th:text="${salary.id} ? 'ویرایش حقوق پایه' : 'حقوق پایه سالانه جدید'">فرم</h3>
        </div>
        <div class="card-body">
            <form th:action="@{/salary/save}" th:object="${salary}" method="post" id="salaryForm">
                <input type="hidden" th:field="*{id}" />
                <input type="hidden" th:field="*{year}" />

                <div class="mb-3">
                    <label class="form-label">سال </label>
                    <input type="number" th:field="*{shamsiYear}" class="form-control" placeholder="مثال: 1403" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">حقوق پایه (ریال)</label>
                    <input type="text" id="basicSalary" class="form-control number-format" required>
                    <input type="hidden" th:field="*{basicSalary}" id="basicSalaryHidden">
                </div>
                <div class="mb-3">
                    <label class="form-label">حق مسکن (ریال)</label>
                    <input type="text" id="housingAllowance" class="form-control number-format" required>
                    <input type="hidden" th:field="*{housingAllowance}" id="housingAllowanceHidden">
                </div>
                <div class="mb-3">
                    <label class="form-label">بن کارگری (ریال)</label>
                    <input type="text" id="breadAllowance" class="form-control number-format" required>
                    <input type="hidden" th:field="*{breadAllowance}" id="breadAllowanceHidden">
                </div>
                <div class="mb-3">
                    <label class="form-label">درصد بیمه</label>
                    <input type="number" step="0.1" th:field="*{insurancePercent}" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success">💾 ذخیره</button>
                <a th:href="@{/salary}" class="btn btn-secondary">🔙 بازگشت</a>
            </form>
        </div>
    </div>
</div>

<script>
    function formatNumber(num) {
        if (!num) return '';
        return Number(num).toLocaleString('en-US');
    }

    function parseNumber(str) {
        if (!str) return '';
        return str.replace(/,/g, '');
    }

    const basicSalaryInput = document.getElementById('basicSalary');
    const basicSalaryHidden = document.getElementById('basicSalaryHidden');
    const housingAllowanceInput = document.getElementById('housingAllowance');
    const housingAllowanceHidden = document.getElementById('housingAllowanceHidden');
    const breadAllowanceInput = document.getElementById('breadAllowance');
    const breadAllowanceHidden = document.getElementById('breadAllowanceHidden');

    if (basicSalaryHidden.value) {
        basicSalaryInput.value = formatNumber(basicSalaryHidden.value);
    }
    if (housingAllowanceHidden.value) {
        housingAllowanceInput.value = formatNumber(housingAllowanceHidden.value);
    }
    if (breadAllowanceHidden.value) {
        breadAllowanceInput.value = formatNumber(breadAllowanceHidden.value);
    }

    basicSalaryInput.addEventListener('input', function() {
        let rawValue = parseNumber(this.value);
        this.value = formatNumber(rawValue);
        basicSalaryHidden.value = rawValue;
    });

    housingAllowanceInput.addEventListener('input', function() {
        let rawValue = parseNumber(this.value);
        this.value = formatNumber(rawValue);
        housingAllowanceHidden.value = rawValue;
    });

    breadAllowanceInput.addEventListener('input', function() {
        let rawValue = parseNumber(this.value);
        this.value = formatNumber(rawValue);
        breadAllowanceHidden.value = rawValue;
    });

    document.getElementById('salaryForm').addEventListener('submit', function() {
        basicSalaryHidden.value = parseNumber(basicSalaryInput.value);
        housingAllowanceHidden.value = parseNumber(housingAllowanceInput.value);
        breadAllowanceHidden.value = parseNumber(breadAllowanceInput.value);
    });
</script>
</body>
</html>
